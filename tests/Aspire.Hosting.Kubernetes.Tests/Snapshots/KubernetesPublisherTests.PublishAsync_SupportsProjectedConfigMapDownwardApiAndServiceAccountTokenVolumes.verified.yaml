---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "myapp-deployment"
  labels:
    app.kubernetes.io/name: "aspire-hosting-tests"
    app.kubernetes.io/component: "myapp"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "aspire-hosting-tests"
        app.kubernetes.io/component: "myapp"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "mcr.microsoft.com/dotnet/aspnet:8.0"
          name: "myapp"
          volumeMounts:
            - name: "projected-config"
              mountPath: "/mnt/config"
              readOnly: true
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "projected-config"
          projected:
            sources:
              - configMap:
                  items:
                    - path: "config/appsettings.json"
                      key: "appsettings.json"
                  name: "app-config"
                  optional: true
              - downwardAPI:
                  items:
                    - fieldRef:
                        fieldPath: "metadata.name"
                      path: "pod/name"
                    - mode: 256
                      path: "resources/cpu-limit"
                      resourceFieldRef:
                        containerName: "myapp"
                        resource: "limits.cpu"
              - serviceAccountToken:
                  audience: "api"
                  expirationSeconds: 3600
                  path: "tokens/api-token"
  selector:
    matchLabels:
      app.kubernetes.io/name: "aspire-hosting-tests"
      app.kubernetes.io/component: "myapp"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
