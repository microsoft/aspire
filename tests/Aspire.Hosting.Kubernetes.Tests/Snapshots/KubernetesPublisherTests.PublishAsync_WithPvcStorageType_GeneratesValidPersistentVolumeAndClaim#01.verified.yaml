---
apiVersion: "v1"
kind: "PersistentVolume"
metadata:
  name: "service-data-pv"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "service"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  storageClassName: "managed-csi"
  accessModes:
    - "ReadWriteOnce"
  capacity:
    storage: "10Gi"
