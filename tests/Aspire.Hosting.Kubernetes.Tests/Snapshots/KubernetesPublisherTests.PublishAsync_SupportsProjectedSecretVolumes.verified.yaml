---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "myapp-deployment"
  labels:
    app.kubernetes.io/name: "aspire-hosting-tests"
    app.kubernetes.io/component: "myapp"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "aspire-hosting-tests"
        app.kubernetes.io/component: "myapp"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "mcr.microsoft.com/dotnet/aspnet:8.0"
          name: "myapp"
          volumeMounts:
            - name: "projected-secrets"
              mountPath: "/mnt/secrets"
              readOnly: true
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "projected-secrets"
          projected:
            defaultMode: 420
            sources:
              - secret:
                  items:
                    - path: "first/username"
                      key: "username"
                  name: "first-secret"
              - secret:
                  items:
                    - mode: 256
                      path: "second/password"
                      key: "password"
                  name: "second-secret"
                  optional: true
  selector:
    matchLabels:
      app.kubernetes.io/name: "aspire-hosting-tests"
      app.kubernetes.io/component: "myapp"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
