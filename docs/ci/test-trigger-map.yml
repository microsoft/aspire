# Test trigger map (machine-readable)
#
# Maps repo path globs -> CI targets that must run when a matching file changes.
# Base derived from the .csproj graph: ProjectReference edges PLUS cross-src
# <Compile Include> edges (a project compiling another src project's .cs file depends
# on it), traversed src->src only so leaf integrations are NOT inflated by the shared
# tests/Aspire.Hosting.Tests hub. Curated rules layer on for runtime/loose-file deps and
# the non-.NET jobs. Companion doc: test-trigger-map.md
#
# STATUS: descriptive map for auditing a future selective-CI implementation. Today CI runs
# the full matrix (gated only by eng/testing/github-ci-trigger-patterns.txt). Nothing
# consumes this file yet.
#
# Target vocabulary:
#   test:<Name>                a .NET test project tests/<Name> (run-tests.yml matrix entry)
#   job:polyglot               tests.yml -> polyglot-validation.yml (py/go/java/rust/ts)
#   job:typescript-sdk         tests.yml -> typescript-sdk-tests.yml
#   job:typescript-api-compat  tests.yml -> typescript-api-compat.yml
#   job:extension-unit         tests.yml extension_tests_win + extension_bootstrap_linux
#   job:extension-e2e          tests.yml -> extension-e2e-tests.yml (gated by extension_e2e_changes)
#   job:cli-starter            tests.yml cli_starter_validation_windows
#   job:api-diffs              generate-api-diffs.yml    (schedule-only today)
#   job:ats-diffs              generate-ats-diffs.yml    (schedule-only today)
#   job:deployment-e2e         deployment-tests.yml      (schedule/dispatch-only today)
#   ALL                        full test matrix + all jobs
#   ALL_HOSTING_TESTS          alias: every hosting-side test project (see aliases:)
#   ALL_COMPONENT_TESTS        alias: every client-component test project (see aliases:)
#
# Resolution: union the targets of every rule whose glob matches a changed file. Any match
# in run_all_globs short-circuits to ALL. Self-changes to a test project always run that
# project (see test_self).
