# Test trigger map (machine-readable) -- the CURATED layer of selective CI.
#
# This file maps repo path globs -> CI targets that must run when a matching file changes.
# It deliberately contains ONLY what the MSBuild project graph cannot see. The graph-derived
# closure (ProjectReference edges, Central Package Management, Directory.Build.* , and
# file-level <Compile Include> of another project's source) is computed at runtime by
# `dotnet-affected` over Aspire.slnx (Layer 1); the selector unions that with the rules here
# (Layer 2). So leaf integration -> own test, core fan-out, and the test-hub fan-out are NOT
# enumerated here -- dotnet-affected reproduces them live and can never drift.
#
# What stays curated here (graph-invisible):
#   run_all_globs           build infrastructure / broadly shared code -> ALL
#   curated_jobs            non-.NET jobs (polyglot, extension, typescript, ...) -- no MSBuild edge
#   loose_file_deps         runtime/loose-file reads (tests reading files by path, hive installs)
#   shared_source           shared dirs with no owning csproj (Components/Common, Vendoring)
#   shared_compiled_source  specific files link-compiled elsewhere; the oracle (--assume-changes)
#                           is project-granular and cannot verify these, so they stay static
#   test_self               a test project's own folder change -> that test project
#   groups                  named, reusable bundles of test: and/or job: targets
#
# Companion docs: test-trigger-map.md, test-trigger-selector-design.md
#
# Target vocabulary:
#   test:<Name>                a .NET test project tests/<Name> (run-tests.yml matrix entry)
#   job:polyglot               tests.yml -> polyglot-validation.yml (py/go/java/rust/ts)
#   job:typescript-sdk         tests.yml -> typescript-sdk-tests.yml
#   job:typescript-api-compat  tests.yml -> typescript-api-compat.yml
#   job:extension-unit         tests.yml extension_tests_win + extension_bootstrap_linux
#   job:extension-e2e          tests.yml -> extension-e2e-tests.yml (gated by extension_e2e_changes)
#   job:cli-starter            tests.yml cli_starter_validation_windows
#   job:api-diffs              generate-api-diffs.yml    (schedule-only today)
#   job:ats-diffs              generate-ats-diffs.yml    (schedule-only today)
#   job:deployment-e2e         deployment-tests.yml      (schedule/dispatch-only today)
#   ALL                        full test matrix + all jobs
#   <GROUP_NAME>               a named group (see groups:) expanding to its test:/job: members
#
# Resolution: union the targets of every rule whose glob matches a changed file, expanding
# group names to their members, and union in the Layer 1 (dotnet-affected) test projects. Any
# match in run_all_globs short-circuits to ALL. Self-changes to a test project always run that
# project (see test_self).
version: 1

