    - test:Aspire.Cli.EndToEnd.Tests
    - job:cli-starter
    - job:extension-e2e

# 0. Test self-changes: tests/<X>/** -> test:<X> (applies to every test project) ----
test_self:
  pattern: tests/<TestProject>/**
  target: test:<TestProject>
  note: a change under a test project's own folder always runs that test project

# 1. Catch-all: build infrastructure & shared code -> ALL ----------------------
run_all_globs:
  - global.json
  - NuGet.config
  - .config/dotnet-tools.json
  - Directory.Build.props
  - Directory.Build.targets
  - Directory.Packages.props
  - Aspire.slnx
  - src/Directory.Build.props
  - src/Directory.Build.targets
  - tests/Directory.Build.props
  - tests/Directory.Build.targets
  - tests/Directory.Packages.props
  - eng/*.props      # any root-level eng build prop (Versions, Testing, Build, Publishing, Signing, ...) -> err toward ALL
  - eng/*.targets    # any root-level eng build target (Testing, AfterSigning, ReplaceText, ...) -> err toward ALL
  - eng/OuterPreBuild.proj   # build-wide project-name validation traversal -> err toward ALL
  - eng/Version.Details.xml
  - eng/common/**
  - src/Shared/**
  - tests/Shared/**
  - .github/actions/enumerate-tests/**
  - eng/scripts/split-test-matrix-by-deps.ps1
  - eng/TestEnumerationRunsheetBuilder/**
  - eng/testing/CITestsProperties.props
  - .github/workflows/tests.yml
  - .github/workflows/run-tests.yml
  - .github/workflows/specialized-test-runner.yml
  - .github/workflows/build-packages.yml
  - .github/workflows/build-cli-native-archives.yml
  - .github/workflows/build-cli-e2e-image.yml

# 2. Shared source dirs with no owning csproj ----------------------------------
shared_source:
  - paths: [src/Components/Common/**]
    targets: [ALL_COMPONENT_TESTS]   # compiled into many client components (Package.targets glob)
  - paths: [src/Vendoring/OpenTelemetry.Instrumentation.StackExchangeRedis/**, src/Vendoring/OpenTelemetry.Shared/**]
    targets: [test:Aspire.StackExchange.Redis.Tests, test:Aspire.StackExchange.Redis.DistributedCaching.Tests, test:Aspire.StackExchange.Redis.OutputCaching.Tests, test:Aspire.Microsoft.Azure.StackExchangeRedis.Tests]
    note: vendored OTel sources compiled into src/Components/Aspire.StackExchange.Redis
  - paths: [src/Vendoring/OpenTelemetry.Instrumentation.ConfluentKafka/**, src/Vendoring/OpenTelemetry.Shared/**]
    targets: [test:Aspire.Confluent.Kafka.Tests]
    note: vendored OTel sources compiled into src/Components/Aspire.Confluent.Kafka

# 3. Curated job rules ---------------------------------------------------------
curated_jobs:
  - target: job:polyglot
    reason: ATS typesystem -> per-language SDK generators -> RemoteHost server + CLI run + fixtures
    paths:
      - src/Aspire.TypeSystem/**
      - src/Aspire.Hosting.RemoteHost/**
      - src/Aspire.Managed/**
      - src/Aspire.Cli/**
      - src/Aspire/Cli/**
      - src/Aspire.AppHost.Sdk/**
      - src/Aspire.Hosting.CodeGeneration.Go/**
      - src/Aspire.Hosting.CodeGeneration.Java/**
      - src/Aspire.Hosting.CodeGeneration.Python/**
      - src/Aspire.Hosting.CodeGeneration.Rust/**
      - src/Aspire.Hosting.CodeGeneration.TypeScript/**
      - src/Aspire.Hosting.Go/**
      - src/Aspire.Hosting.JavaScript/**
      - src/Aspire.Hosting.Python/**
      - tests/PolyglotAppHosts/**
      - .github/workflows/polyglot-validation/**
      - .github/workflows/polyglot-validation.yml
  - target: job:typescript-sdk
    reason: vitest unit tests over generated TS SDK (@aspire/transport, @aspire/base)
    paths:
      - src/Aspire.Hosting.CodeGeneration.TypeScript/**
      - tests/Aspire.Hosting.CodeGeneration.TypeScript.JsTests/**
      - src/Aspire.Cli/Templating/Templates/ts-starter/**
      - .github/workflows/typescript-sdk-tests.yml
  - target: job:typescript-api-compat
    reason: compares checked-in *.ats.txt baselines vs fresh `aspire sdk dump --format ci`
    paths:
      - src/Aspire.Hosting*/**
      - src/Aspire.Hosting*/api/*.ats.txt
      - src/**/*.tscompat.suppression.txt
      - src/Aspire.Cli/**
      - tools/TypeScriptApiCompat/**
      - .github/workflows/typescript-api-compat.yml
  - target: job:extension-unit
    reason: extension_tests_win + extension_bootstrap_linux run yarn build/test in extension/
    paths:
      - extension/**
  - target: job:extension-e2e
    reason: verbatim curated filter in tests.yml extension_e2e_changes job (~line 269)
    paths:
      - extension/**
      - src/Aspire.Cli/**
      - src/Aspire/Cli/**
      - src/Aspire.Hosting*/**
      - src/Aspire.Dashboard*/**
      - tests/Aspire.Cli.Tests/**
      - tests/Aspire.Cli.EndToEnd.Tests/**
      - tests/Aspire.Hosting.Tests/Cli/**
      - eng/scripts/get-aspire-cli*
      - .github/workflows/tests.yml
      - .github/workflows/extension-e2e-tests.yml
      - .github/workflows/build-packages.yml
      - .github/workflows/build-cli-native-archives.yml
  - target: job:cli-starter
    reason: Windows starter-app smoke installing the PR CLI via dogfood script
    paths:
      - eng/scripts/get-aspire-cli-pr.ps1
      - eng/scripts/cli-starter-validation.ps1
      - src/Aspire.Cli/**
      - src/Aspire/Cli/**
      - src/Aspire.TypeSystem/**
      - src/Aspire.Managed/**
  - target: job:api-diffs
    reason: SCHEDULE-ONLY today; regenerates src/*/api/*.cs reference baselines
    paths:
      - src/**/*.csproj
      - src/**/api/*.cs
      - .github/workflows/generate-api-diffs.yml
  - target: job:ats-diffs
    reason: SCHEDULE-ONLY today; regenerates *.ats.txt via `aspire sdk dump`
    paths:
      - src/Aspire.Hosting*/**
      - src/Aspire.Hosting*/api/*.ats.txt
      - src/Aspire.Cli/**
      - src/**/*.tscompat.suppression.txt
      - .github/workflows/generate-ats-diffs.yml
  - target: job:deployment-e2e
    reason: SCHEDULE/DISPATCH-ONLY today; deploys generated apps to Azure
    paths:
      - tests/Aspire.Deployment.EndToEnd.Tests/**
      - src/Aspire.Hosting.Azure*/**
      - src/Aspire.Cli/**
      - src/Aspire/Cli/**
      - src/Aspire.TypeSystem/**
      - src/Aspire.Managed/**
      - src/Aspire.ProjectTemplates/**
      - .github/workflows/deployment-tests.yml
  - target: test:Aspire.EndToEnd.Tests
    reason: OUTERLOOP-ONLY today (SkipTests on GH Actions unless RunOuterloopTests); builds testproject apphost against built nugets
    paths:
      - tests/Aspire.EndToEnd.Tests/**
      - tests/testproject/**
      - src/Aspire.Hosting/**
      - src/Aspire.Hosting.AppHost/**
      - src/Aspire.Hosting.PostgreSQL/**
      - src/Aspire.Hosting.Redis/**
  - target: test:Aspire.Cli.EndToEnd.Tests
    reason: consumes the CLI native archive (RequiresCliArchive=true) built from these sources; runs aspire end-to-end
    paths:
      - src/Aspire.Cli/**
      - src/Aspire/Cli/**
      - src/Aspire.TypeSystem/**
      - src/Aspire.Managed/**
      - src/Aspire.AppHost.Sdk/**
      - eng/clipack/**

# 4. Runtime / loose-file dependencies (invisible to the csproj graph) ----------
loose_file_deps:
  - paths:
      - eng/scripts/get-aspire-cli.sh
      - eng/scripts/get-aspire-cli.ps1
      - eng/scripts/get-aspire-cli-pr.sh
      - eng/scripts/get-aspire-cli-pr.ps1
    targets: [test:Aspire.Acquisition.Tests, test:Aspire.Cli.EndToEnd.Tests, job:cli-starter, job:extension-e2e]
    reason: Acquisition.Tests asserts script behavior; CliE2EAutomatorHelpers.cs:406,415 invokes get-aspire-cli*.sh at runtime
  - paths:
      - eng/clipack/**
    targets: [test:Aspire.Cli.Tests, test:Aspire.Cli.EndToEnd.Tests, test:Infrastructure.Tests]
    reason: Cli.Tests/Npm/AspireJsLauncherTests reads eng/clipack/npm/aspire.js; Infrastructure.Tests reads eng/clipack/*; CLI archive consumed by e2e
  - paths:
      - eng/scripts/pack-cli-npm-package.ps1
    targets: [test:Aspire.Cli.Tests, test:Infrastructure.Tests]
    reason: Cli.Tests/Npm/AspireJsLauncherTests and Infrastructure.Tests parse this script
  - paths:
      - eng/dashboardpack/**
    targets: [test:Aspire.Hosting.Sdk.Tests]
    reason: AppHostSdkTargetsTests asserts Aspire.Dashboard.Sdk.* package ref
  - paths:
      - eng/dcppack/**
    targets: [test:Aspire.Hosting.Sdk.Tests, test:Aspire.TerminalHost.Tests]
    reason: AppHostSdkTargetsTests asserts Aspire.Hosting.Orchestration.*; TerminalHost exercises DCP
  - paths:
      - src/Aspire.ProjectTemplates/**
    targets: [test:Aspire.Templates.Tests]
    reason: Templates.Tests installs the template hive from src/Aspire.ProjectTemplates
  - paths:
      - playground/**
    targets: [test:Aspire.Playground.Tests]
    reason: Aspire.Playground.Tests builds/runs apps under playground/
  - paths:
      - src/Aspire.AppHost.Sdk/**
    targets: [test:Aspire.Hosting.Sdk.Tests, test:Aspire.Hosting.DotnetTool.Tests, job:polyglot]
    reason: AppHost SDK targets + RuntimeIdentifier tool; SDK ships to every generated apphost
  - paths:
      - tools/QuarantineTools/**
    targets: [test:QuarantineTools.Tests]
    reason: QuarantineTools.Tests exercises the quarantine/disable source-rewriting logic
  - paths:
      - tools/SelectTests/**
    targets: [test:Infrastructure.Tests]
    reason: SelectTests acceptance/behavior tests live in Infrastructure.Tests/TestTriggerMap
  - paths:
      - .github/workflows/**
      - eng/pipelines/**
      - eng/Signing.props
    targets: [test:Infrastructure.Tests]
    reason: Infrastructure.Tests WorkflowScripts/Pipelines assert on workflow & pipeline files

  - paths: [eng/Bundle.proj]
    targets: [CLI_BUNDLE]
    reason: assembles the CLI bundle (Aspire.Managed + native CLI + DCP); consumed by CLI e2e/starter/extension, not integrations

