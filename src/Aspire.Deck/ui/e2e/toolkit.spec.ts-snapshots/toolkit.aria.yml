    - status: No action selected
    - button "Secondary"
    - button "Primary"
    - button "Danger"
    - button "Ghost"
    - button "Confirm command"
    - button "Open drawer"
    - button "Open dialog"
    - button "View sample JSON"
    - button "Show notification"
    - button "Resource commands"
    - button "Sample filters": Filters
    - button "Add filter"
