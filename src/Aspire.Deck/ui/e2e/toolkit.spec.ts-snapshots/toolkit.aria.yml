- main:
  - heading "Deck Toolkit" [level=1]
  - paragraph: Fluent React primitives with Aspire density and tokens
  - button "Use light theme"
  - region "Page composition":
    - heading "Page composition" [level=2]
    - region "Sample resources":
      - heading "Sample resources" [level=2]
      - paragraph: 3 resources
      - status: Not refreshed
      - button "Refresh sample resources"
      - toolbar "Sample resource tools":
        - textbox "Filter sample resources…"
      - text: frontend Running · Healthy catalog-db Running · Degraded migration Exited
  - region "Force graph":
    - heading "Force graph" [level=2]
    - status: No graph selection
    - group "Sample force graph":
      - button "frontend, Project, Running"
      - button "catalog-db, Container, Running"
      - button "migration, Executable, Exited"
    - toolbar "Sample graph controls":
      - button "Sample zoom in"
      - button "Sample zoom out"
      - button "Sample reset view"
