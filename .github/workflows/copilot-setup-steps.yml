name: "Copilot Setup Steps"

# Allow testing of the setup steps from your repository's "Actions" tab.
on: workflow_dispatch

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ${{ github.repository_owner == 'microsoft' && '8-core-ubuntu-latest' || 'ubuntu-latest' }}

    permissions:
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install gh aw to enable GitHub Copilot Agent integration
      - name: Install gh-aw extension
        uses: github/gh-aw-actions/setup-cli@ff0525b685481744f490a0d362753d8001e4b39d # v0.72.0
        with:
          version: v0.72.0

      # Cache the local .NET SDK (installed into .dotnet by restore) so subsequent
      # sessions skip the multi-hundred-MB SDK + runtime download. Keyed on the files
      # that determine the SDK/runtime versions; falls back to the latest partial match.
      - name: Cache local .NET SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .dotnet
          key: ${{ runner.os }}-${{ runner.arch }}-aspire-dotnet-${{ hashFiles('global.json', 'eng/Versions.props') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-aspire-dotnet-

      # Cache restored NuGet packages so restore is incremental across sessions.
      # build.sh runs without -ci, so Arcade uses the global cache (~/.nuget/packages).
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ runner.arch }}-aspire-nuget-${{ hashFiles('**/Directory.Packages.props', 'global.json', 'eng/Versions.props') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-aspire-nuget-

      - name: Build solution
        # a full build is too slow; also do not fail on errors, continue so that
        # copilot can attempt to recover. `time` surfaces restore duration in the log
        # so changes to this workflow can be compared run-to-run.
        run: time ./build.sh -restore || true

      # Install verify tool for snapshot testing
      - name: Install verify tool
        run: ./dotnet.sh tool install --global Verify.Tool --version 0.6.0 || true

      - name: Setup PATH
        # Must be a block scalar (|): a plain scalar folds these two lines into a
        # single command, so the second echo would not run and the repo-local
        # .dotnet SDK would never be added to PATH.
        run: |
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          echo "$PWD/.dotnet/" >> $GITHUB_PATH

      # For MCP servers like nuget's
      - name: Install .NET 10.x
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.x
          dotnet-quality: preview

      # for MCP servers
      - name: Install .NET 8.x
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            8.x

      # Diagnostics in the log
      - name: dotnet --info
        run: dotnet --info
