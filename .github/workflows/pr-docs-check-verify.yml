name: Verify pr-docs-check workflow

# Guards the pr-docs-check agentic workflow so the compiled lock file can never
# drift from its source. pr-docs-check.lock.yml is GENERATED by `gh aw compile`
# from pr-docs-check.md and must be committed in lockstep; without this check a
# contributor could edit the .md (or hand-edit the lock) and merge an out-of-date
# lock that no longer reflects the source. This job recompiles with the pinned
# gh-aw version and fails if the result differs from what was committed. It also
# runs the compute_signals unit tests, since that helper feeds the workflow.
#
# This is an ordinary GitHub Actions workflow (not an agentic .md workflow), so
# it is hand-authored and never compiled by gh aw.

on:
  pull_request:
    paths:
      - '.github/workflows/pr-docs-check.md'
      - '.github/workflows/pr-docs-check.lock.yml'
      - '.github/workflows/pr-docs-check/**'
      - '.github/workflows/pr-docs-check-verify.yml'
      - '.github/aw/actions-lock.json'
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    name: Recompile lock and run tests
    # Only run on the canonical repo; forks lack the gh-aw release access this needs
    # and the check is meaningless on a fork's default branch.
    if: github.repository == 'microsoft/aspire'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout the repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned gh-aw extension
        env:
          # gh reads GH_TOKEN for authenticated extension installs (avoids rate limits).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Single-source the version from actions-lock.json so this check tracks the
          # same gh-aw the agentic workflow is pinned to; a different compiler version
          # emits a different lock and would cause confusing false diffs here.
          version="$(python3 -c "import json; d = json.load(open('.github/aw/actions-lock.json')); print(next(v['version'] for k, v in d['entries'].items() if k.startswith('github/gh-aw-actions/setup@')))")"
          echo "Pinning gh-aw to ${version} (from .github/aw/actions-lock.json)"
          gh extension install github/gh-aw --pin "${version}"
          gh aw version

      - name: Recompile pr-docs-check
        run: gh aw compile pr-docs-check

      - name: Verify lock is in sync with source
        run: |
          set -euo pipefail
          lock='.github/workflows/pr-docs-check.lock.yml'
          if ! git diff --exit-code -- "${lock}"; then
            echo "::error file=${lock}::${lock} is out of date. Edit pr-docs-check.md, run 'gh aw compile pr-docs-check' (or .github/workflows/pr-docs-check/build.py), and commit the regenerated lock."
            exit 1
          fi
          echo "Lock is in sync with the committed source."

      - name: Run compute_signals tests
        run: python3 -m unittest discover -s .github/workflows/pr-docs-check -v
