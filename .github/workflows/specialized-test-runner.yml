# Reusable workflow for running specialized test suites (quarantined and outerloop tests).
#
# Uses the same metadata-driven pipeline as tests.yml:
#   1. Grep for attribute markers → BeforeBuildProps.props (limits build scope)
#   2. TestEnumerationRunsheetBuilder → .tests-metadata.json per project (deterministic)
#   3. build-test-matrix.ps1 → canonical platform-agnostic matrix
#   4. expand-test-matrix-github.ps1 → per-OS entries with runner mappings
#   5. split-test-matrix-by-deps.ps1 → 6 dependency-based buckets
#
# Compared to tests.yml, this workflow:
#   - Scopes the build to only projects containing the target attribute (grep-based)
#   - Passes specialized MSBuild properties (RunQuarantinedTests/RunOuterloopTests)
#   - Uses positive trait filtering for class-level test splitting and execution
#   - Overrides enablePlaywrightInstall on all test entries
#   - On PRs, filters to a single project for fast sanity checks
name: Specialized Test Runner

on:
  workflow_call:
    inputs:
      attributeName:
        required: true
        type: string
        description: 'Attribute name to filter tests by (e.g., QuarantinedTest or OuterloopTest)'
      extraTestArgs:
        required: false
        type: string
        description: 'Additional non-filter test arguments passed to run-tests.yml'
      enablePlaywrightInstall:
        required: true
        type: boolean
        description: 'Controls whether to install Playwright browsers during project build'
      ignoreTestFailures:
        required: false
        type: boolean
        default: false
        description: 'When true, ignores test failures and checks if .trx files have nonzero test count'

jobs:

  generate_tests_matrix:
    name: Generate test matrix
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'microsoft' }}
    outputs:
      tests_matrix_no_nugets: ${{ steps.split_matrix.outputs.tests_matrix_no_nugets }}
      tests_matrix_no_nugets_overflow: ${{ steps.split_matrix.outputs.tests_matrix_no_nugets_overflow }}
      tests_matrix_requires_nugets_linux: ${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_linux }}
      tests_matrix_requires_nugets_windows: ${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_windows }}
      tests_matrix_requires_nugets_macos: ${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_macos }}
      tests_matrix_requires_cli_archive: ${{ steps.split_matrix.outputs.tests_matrix_requires_cli_archive }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Derive MSBuild properties from attribute name
        id: derive_props
        shell: bash
        run: |
          ATTR="${{ inputs.attributeName }}"
          case "$ATTR" in
            QuarantinedTest)
              echo "msbuild_prop=/p:RunQuarantinedTests=true" >> "$GITHUB_OUTPUT"
              echo "discovery_filter=quarantined=true" >> "$GITHUB_OUTPUT"
              ;;
            OuterloopTest)
              echo "msbuild_prop=/p:RunOuterloopTests=true" >> "$GITHUB_OUTPUT"
              echo "discovery_filter=outerloop=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown attributeName '$ATTR'. Expected QuarantinedTest or OuterloopTest."
              exit 1
              ;;
          esac

      - name: Identify relevant test projects
        run: ./eng/scripts/generate-specialized-test-projects-list.sh "${{ inputs.attributeName }}" "${{ github.workspace }}/artifacts/BeforeBuildProps.props"

      - name: Restore
        run: ./restore.sh

      - name: Build ExtractTestPartitions tool
        run: dotnet build tools/ExtractTestPartitions/ExtractTestPartitions.csproj -c Release --nologo -v quiet

      # Generate the canonical test matrix using the new metadata-driven pipeline.
      # - BeforeBuildPropsPath limits enumeration to projects containing the attribute
      # - The specialized MSBuild prop (e.g., RunQuarantinedTests=true) ensures projects
      #   gated on that prop are included (some csproj files set SkipTests unless the prop is set)
      # - DiscoveryTraitFilter enables positive filtering for class-level test splitting
      #   (e.g., only discovers classes that contain quarantined tests)
      # - SpecializedTraitFilter moves the execution filter into each matrix entry so
      #   split entries intersect the specialized trait with the class/partition shard.
      - name: Generate canonical test matrix
        run: >
          ./build.sh -test
          /p:TestRunnerName=TestEnumerationRunsheetBuilder
          /p:TestMatrixOutputPath=artifacts/canonical-test-matrix.json
          /p:GenerateCIPartitions=true
          /p:InstallBrowsersForPlaywright=false
          /p:BeforeBuildPropsPath=${{ github.workspace }}/artifacts/BeforeBuildProps.props
          /p:IncludeTemplateTests=true
          /p:IncludeCliE2ETests=true
          ${{ steps.derive_props.outputs.msbuild_prop }}
          /p:DiscoveryTraitFilter=${{ steps.derive_props.outputs.discovery_filter }}
          /p:SpecializedTraitFilter=${{ steps.derive_props.outputs.discovery_filter }}
          /bl

      - name: Expand matrix for GitHub Actions
        id: expand_matrix
        shell: pwsh
        run: |
          $canonicalMatrixPath = "${{ github.workspace }}/artifacts/canonical-test-matrix.json"
          $expandScript = "${{ github.workspace }}/eng/scripts/expand-test-matrix-github.ps1"

          if (Test-Path $canonicalMatrixPath) {
            & $expandScript -CanonicalMatrixFile $canonicalMatrixPath -OutputToGitHubEnv
          } else {
            $emptyMatrix = '{"include":[]}'
            "all_tests=$emptyMatrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "No canonical test matrix found, using empty matrix"
          }

      # Override enablePlaywrightInstall on all entries and apply PR filter.
      # On PRs, keep only one project's entries for fast sanity checks.
      - name: Inject properties and apply PR filter
        id: inject_and_filter
        shell: pwsh
        run: |
          $matrixJson = '${{ steps.expand_matrix.outputs.all_tests }}'
          $matrix = $matrixJson | ConvertFrom-Json

          if ($matrix.include.Count -eq 0) {
            "all_tests=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Empty matrix, nothing to filter"
            return
          }

          # Override enablePlaywrightInstall on all entries
          $enablePw = [bool]::Parse("${{ inputs.enablePlaywrightInstall }}")
          foreach ($entry in $matrix.include) {
            $entry.properties.enablePlaywrightInstall = $enablePw
          }

          # On PRs, filter to a single project for fast sanity checks
          if ("${{ github.event_name }}" -eq "pull_request") {
            $firstProject = $matrix.include[0].projectName
            $matrix.include = @($matrix.include | Where-Object { $_.projectName -eq $firstProject })
            Write-Host "PR mode: filtered to project '$firstProject' ($($matrix.include.Count) entries)"
          }

          $result = $matrix | ConvertTo-Json -Depth 10 -Compress
          "all_tests=$result" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Split matrix by dependency type
        id: split_matrix
        shell: pwsh
        run: |
          $splitScript = "${{ github.workspace }}/eng/scripts/split-test-matrix-by-deps.ps1"
          & $splitScript -AllTestsMatrix '${{ steps.inject_and_filter.outputs.all_tests }}' -OutputToGitHubEnv

      - name: Upload logs
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: logs-runsheet
          path: |
            ${{ github.workspace }}/artifacts/BeforeBuildProps.props
            ${{ github.workspace }}/artifacts/log/**/*.binlog
            ${{ github.workspace }}/artifacts/**/*tests-partitions.json
            ${{ github.workspace }}/artifacts/**/*tests-metadata.json
            ${{ github.workspace }}/artifacts/canonical-test-matrix.json
          retention-days: 5

  build_packages:
    name: Build packages
    needs: [generate_tests_matrix]
    if: >-
      ${{ github.repository_owner == 'microsoft' && (
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_linux).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_windows).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_macos).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_cli_archive).include[0] != null
      ) }}
    uses: ./.github/workflows/build-packages.yml

  build_cli_archives:
    name: Build native CLI archives
    needs: [generate_tests_matrix]
    if: >-
      ${{ github.repository_owner == 'microsoft' && (
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_linux).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_windows).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_macos).include[0] != null ||
        fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_cli_archive).include[0] != null
      ) }}
    uses: ./.github/workflows/build-cli-native-archives.yml

  # --- Test execution via shared split-tests workflow ---

  build_cli_e2e_image:
    name: Build CLI E2E Docker image
    needs: [generate_tests_matrix]
    if: ${{ github.repository_owner == 'microsoft' && fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_cli_archive).include[0] != null }}
    uses: ./.github/workflows/build-cli-e2e-image.yml

  run_tests:
    needs: [generate_tests_matrix, build_packages, build_cli_archives, build_cli_e2e_image]
    # Allow tests to run even if build_cli_archives partially fails (e.g., one RID
    # like osx-arm64 has an infra issue but linux-x64 succeeded). Tests that need
    # a failed RID's archive will fail at the download step.
    # We still require generate_tests_matrix and build_packages to succeed.
    if: >-
      ${{
        github.repository_owner == 'microsoft' &&
        !cancelled() &&
        needs.generate_tests_matrix.result == 'success' &&
        (needs.build_packages.result == 'success' || needs.build_packages.result == 'skipped') &&
        (needs.build_cli_e2e_image.result == 'success' || needs.build_cli_e2e_image.result == 'skipped')
      }}
    uses: ./.github/workflows/run-tests-core.yml
    with:
      tests_matrix_no_nugets: ${{ needs.generate_tests_matrix.outputs.tests_matrix_no_nugets }}
      tests_matrix_no_nugets_overflow: ${{ needs.generate_tests_matrix.outputs.tests_matrix_no_nugets_overflow }}
      tests_matrix_requires_nugets_linux: ${{ needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_linux }}
      tests_matrix_requires_nugets_windows: ${{ needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_windows }}
      tests_matrix_requires_nugets_macos: ${{ needs.generate_tests_matrix.outputs.tests_matrix_requires_nugets_macos }}
      tests_matrix_requires_cli_archive: ${{ needs.generate_tests_matrix.outputs.tests_matrix_requires_cli_archive }}
      extraTestArgs: "${{ inputs.extraTestArgs }}"
      ignoreTestFailures: ${{ inputs.ignoreTestFailures }}

  # --- Results gate ---

  results:
    if: ${{ always() && github.repository_owner == 'microsoft' }}
    runs-on: ubuntu-latest
    name: Final Results
    needs:
      - generate_tests_matrix
      - build_packages
      - build_cli_archives
      - build_cli_e2e_image
      - run_tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          pattern: logs-*-ubuntu-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/ubuntu-latest

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          pattern: logs-*-windows-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/windows-latest

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          pattern: logs-*-macos-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/macos-latest

      - name: Generate test results summary
        if: always()
        continue-on-error: true
        run: >
          ${{ github.workspace }}/dotnet.sh
          run
          --project ${{ github.workspace }}/tools/GenerateTestSummary/GenerateTestSummary.csproj
          --
          ${{ github.workspace }}/testresults
          --combined

      - name: Fail if any dependency failed
        # 'skipped' can be when a transitive dependency fails and the dependent job gets 'skipped'.
        # For example, one of setup_* jobs failing and the Integration test jobs getting 'skipped'
        # Note: build_packages being skipped is expected when requiresNugets is false.
        # Note: build_cli_archives partial failures (e.g. one RID) are tolerated — tests
        # that need the failed RID will fail individually at the download step.
        if: >-
          ${{
            always() && (
              needs.generate_tests_matrix.result == 'failure' ||
              needs.generate_tests_matrix.result == 'cancelled' ||
              needs.run_tests.result == 'failure' ||
              needs.run_tests.result == 'cancelled' ||
              needs.run_tests.result == 'skipped' ||
              (fromJson(needs.generate_tests_matrix.outputs.tests_matrix_requires_cli_archive).include[0] != null &&
               needs.build_cli_e2e_image.result == 'skipped') ||
              (needs.build_cli_e2e_image.result == 'failure') ||
              (needs.build_cli_e2e_image.result == 'cancelled') ||
              (needs.build_packages.result == 'failure') ||
              (needs.build_packages.result == 'cancelled')
            )
          }}
        run: |
          echo "One or more dependent jobs failed."
          exit 1
