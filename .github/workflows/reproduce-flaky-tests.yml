name: Reproduce Flaky Tests

on:
  workflow_dispatch: {}

env:
  TARGET_OSES: "ubuntu-latest,windows-latest"
  ITERATIONS_PER_RUNNER: "3"
  NPM_REGISTRY: https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public-npm/npm/registry/
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  reproduce-extension-e2e:
    name: "${{ matrix.os }} debug-dashboard"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: pwsh
    env:
      DOTNET_ROOT: ${{ github.workspace }}/.dotnet
      ASPIRE_EXTENSION_E2E_SPEC: out/test-e2e/test-e2e/debugDashboard.e2e.test.js
      ASPIRE_EXTENSION_E2E_UNSET_CLI_START_TIMEOUT: "false"
      ASPIRE_EXTENSION_E2E_SKIP_RESTORE_PREWARM: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Install Corepack
        working-directory: extension
        run: |
          $CorepackHome = Join-Path $env:RUNNER_TEMP 'corepack'
          $env:COREPACK_HOME = $CorepackHome
          "COREPACK_HOME=$CorepackHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $CorepackVersion = (Get-Content -Raw -Path 'scripts/corepack-version.txt').Trim()
          npm install --global --force --registry "$env:NPM_REGISTRY" "corepack@$CorepackVersion"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $npmGlobalBin = (npm prefix --global).Trim()
          $env:PATH = "$npmGlobalBin$([IO.Path]::PathSeparator)$env:PATH"
          $npmGlobalBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $installed = (corepack --version).Trim()
          if ($installed -ne $CorepackVersion) {
            Write-Error "corepack version mismatch: expected $CorepackVersion, got '$installed'."
            exit 1
          }

          corepack enable
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node ./scripts/prepareCorepackYarn.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          corepack yarn --version

      - name: Restore, build, and pack Aspire packages
        run: |
          if ('${{ runner.os }}' -eq 'Windows') {
            $buildScript = '.\build.cmd'
          } else {
            $buildScript = './build.sh'
          }

          & $buildScript -restore -ci -build -pack `
            /p:SkipTestProjects=true `
            /p:SkipPlaygroundProjects=true `
            /p:InstallBrowsersForPlaywright=false `
            /p:SkipNativeBuild=true
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install extension dependencies and compile E2E tests
        working-directory: extension
        run: |
          corepack yarn install --frozen-lockfile --non-interactive
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          corepack yarn compile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          corepack yarn compile-e2e
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Locate built Aspire CLI
        id: cli
        run: |
          $binary = if ('${{ runner.os }}' -eq 'Windows') { 'aspire.exe' } else { 'aspire' }
          $cli = Get-ChildItem -Path '${{ github.workspace }}/artifacts/bin/Aspire.Cli' -Recurse -File -Filter $binary | Sort-Object FullName | Select-Object -First 1
          if ($null -eq $cli) {
            Get-ChildItem -Path '${{ github.workspace }}/artifacts/bin/Aspire.Cli' -Recurse -File | Format-Table -AutoSize
            throw "Unable to find built Aspire CLI '$binary'."
          }
          if ('${{ runner.os }}' -ne 'Windows') {
            chmod +x $cli.FullName
          }
          "ASPIRE_EXTENSION_E2E_CLI_PATH=$($cli.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $cli.FullName --version

      - name: Run debug-dashboard E2E iterations
        working-directory: extension
        run: |
          $ErrorActionPreference = 'Continue'
          $pass = 0
          $fail = 0
          $iterations = [int]'${{ env.ITERATIONS_PER_RUNNER }}'
          $tempRoot = Join-Path $env:RUNNER_TEMP 'aev'
          New-Item -ItemType Directory -Path $tempRoot -Force | Out-Null
          "ASPIRE_EXTENSION_E2E_TEMP_ROOT=$tempRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          for ($i = 1; $i -le $iterations; $i++) {
            Write-Host "::group::debug-dashboard iteration $i/$iterations"
            $env:ASPIRE_EXTENSION_E2E_SHARD = "debug-dashboard-$i"
            $env:ASPIRE_EXTENSION_E2E_TEMP_ROOT = $tempRoot
            if ('${{ runner.os }}' -eq 'Linux') {
              $env:ASPIRE_EXTENSION_E2E_RECORDING_MODE = 'always'
              xvfb-run -a node scripts/run-e2e.js
            } else {
              $env:ASPIRE_EXTENSION_E2E_RECORDING_MODE = 'off'
              node scripts/run-e2e.js
            }
            $result = $LASTEXITCODE
            if ($result -eq 0) {
              Write-Host "✅ Iteration ${i}: PASS"
              $pass++
            } else {
              Write-Host "❌ Iteration ${i}: FAIL (exit $result)"
              $fail++
            }
            Write-Host "::endgroup::"
          }

          Write-Host "Passed: $pass / $iterations"
          Write-Host "Failed: $fail / $iterations"
          if ($fail -gt 0) { exit 1 }

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: issue18524-extension-e2e-diagnostics-${{ matrix.os }}-attempt${{ github.run_attempt }}
          path: |
            extension/.test-results/**
            extension/.test-storage/**/settings/User/**
            extension/.test-storage/**/settings/logs/**
            extension/.test-storage/**/screenshots/**
            extension/.test-storage/**/aspire-home/logs/**
            extension/.test-storage/**/aspire-home/cache/apphost-info/**
            extension/.test-workspaces/**/.aspire/**
            extension/.test-workspaces/**/*.log
            extension/.test-recordings/**
          if-no-files-found: ignore
          include-hidden-files: true
