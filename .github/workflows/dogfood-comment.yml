name: Add Dogfooding Comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to add dogfooding comment to'
        required: true
        type: number

jobs:
  add-dogfood-comment:
    # For workflow_run: only handle fork PRs (same-repo PRs get the comment
    # inline in tests.yml right after build_packages).
    # Also handle manual workflow_dispatch.
    if: >-
      github.repository_owner == 'microsoft' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name != github.repository))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Determine PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Look up the PR associated with the workflow run's head commit.
          # This works for both same-repo and fork PRs.
          PR_NUMBER=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "::notice::Could not determine PR number from workflow run"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check build_packages job succeeded
        if: github.event_name == 'workflow_run' && steps.pr.outputs.number
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          BUILD_RESULT=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --paginate --jq '.jobs[] | select(.name | test("Build packages")) | .conclusion' 2>/dev/null | head -1)

          if [ "$BUILD_RESULT" != "success" ]; then
            echo "::notice::Build packages did not succeed (result: ${BUILD_RESULT:-not found}), skipping dogfood comment"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Add dogfooding comment
        if: steps.pr.outputs.number && steps.check.outputs.skip != 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const bashScript = 'https://raw.githubusercontent.com/microsoft/aspire/main/eng/scripts/get-aspire-cli-pr.sh';
            const psScript = 'https://raw.githubusercontent.com/microsoft/aspire/main/eng/scripts/get-aspire-cli-pr.ps1';
            
            // Unique marker to identify dogfooding comments
            const dogfoodMarker = '<!-- dogfood-pr -->';

            // Skip if comment already exists
            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            if (comments.data.some(c => c.body.includes(dogfoodMarker))) {
              core.info('Dogfood comment already exists, skipping');
              return;
            }
            
            const comment = `${dogfoodMarker}
            🚀 **Dogfood this PR with:**

            > **⚠️ WARNING: Do not do this without first carefully reviewing the code of this PR to satisfy yourself it is safe.**

            \`\`\`bash
            curl -fsSL ${bashScript} | bash -s -- ${prNumber}
            \`\`\`
            Or
            - Run remotely in PowerShell:
            \`\`\`powershell
            iex "& { $(irm ${psScript}) } ${prNumber}"
            \`\`\``;

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
