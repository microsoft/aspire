# Builds the default .NET CLI E2E image used by DockerfileVariant.DotNet.
# Polyglot and Podman variants use separate Dockerfiles with variant-specific
# base image behavior and are intentionally left on their existing per-job paths.
name: Build CLI E2E Docker Image

on:
  workflow_call:

env:
  CLI_E2E_DOTNET_IMAGE_ARTIFACT: cli-e2e-dotnet-image
  CLI_E2E_DOTNET_IMAGE_TAG: aspire-cli-e2e-dotnet:prebuilt
  CLI_E2E_DOTNET_IMAGE_CACHE_SCOPE: cli-e2e-dotnet

jobs:
  build:
    name: Build CLI E2E Docker image
    runs-on: ${{ github.repository_owner == 'microsoft' && '8-core-ubuntu-latest' || 'ubuntu-latest' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Docker is running
        run: docker info

      - name: Build CLI E2E Docker image
        shell: bash
        run: |
          set -euo pipefail

          docker buildx create --name cli-e2e-builder --use
          docker buildx inspect --bootstrap

          build_image() {
            local mirror="$1"
            local -a build_args=(--build-arg SKIP_SOURCE_BUILD=true)

            if [[ -n "$mirror" ]]; then
              echo "Building with Ubuntu apt mirror: $mirror"
              build_args+=(--build-arg "UBUNTU_APT_MIRROR=$mirror")
            else
              echo "Building with the default Ubuntu apt sources"
            fi

            docker buildx build \
              --load \
              --cache-from "type=gha,scope=$CLI_E2E_DOTNET_IMAGE_CACHE_SCOPE" \
              --cache-to "type=gha,scope=$CLI_E2E_DOTNET_IMAGE_CACHE_SCOPE,mode=max,ignore-error=true" \
              "${build_args[@]}" \
              -f tests/Shared/Docker/Dockerfile.e2e \
              -t "$CLI_E2E_DOTNET_IMAGE_TAG" \
              .
          }

          if ! build_image "http://azure.archive.ubuntu.com/ubuntu/"; then
            echo "Build failed with the Azure Ubuntu apt mirror; retrying with default Ubuntu apt sources"
            build_image ""
          fi

          mkdir -p artifacts/cli-e2e-image
          docker save "$CLI_E2E_DOTNET_IMAGE_TAG" | gzip > artifacts/cli-e2e-image/aspire-cli-e2e-dotnet.tar.gz

      - name: Upload CLI E2E Docker image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.CLI_E2E_DOTNET_IMAGE_ARTIFACT }}
          path: artifacts/cli-e2e-image/aspire-cli-e2e-dotnet.tar.gz
          retention-days: 1
