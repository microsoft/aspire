# Validates an Aspire CLI build after it has been published to a public channel.
#
# Dispatched (fire-and-forget) from the AzDO build/release pipelines (see
# eng/pipelines/templates/dispatch-validate-published-build-job.yml). Splits
# every CLI E2E test class into its own job so the shape matches PR validation.
#
# `version` is asserted post-install — `aspire --version` must equal it after
# the channel install — so a stale channel pointer fails the workflow loudly
# instead of silently testing yesterday's build.
name: Validate Published Build

on:
  workflow_dispatch:
    inputs:
      quality:
        description: 'Install quality to validate (dev, staging, release)'
        required: false
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - release
      version:
        description: 'Exact Aspire CLI version to validate'
        required: true
        type: string

  # DO NOT MERGE: temporary push trigger to fire a one-off run from this branch
  # against the stable release channel. `validate-published-build.yml` is not
  # on `main` yet, so `gh workflow run` cannot dispatch it; pushing the branch
  # is the only way to fire it before merge. Restricted to this branch + this
  # workflow file so it won't accidentally fire on unrelated pushes. Hardcoded
  # fallbacks below (`inputs.quality || 'release'`, `inputs.version || '13.4.0'`)
  # provide the values the dispatch path would supply. Revert before merging.
  push:
    branches:
      - ankj/staging-cli-smoke-workflow
    paths:
      - '.github/workflows/validate-published-build.yml'

permissions:
  contents: read

jobs:
  setup_cli_e2e_tests:
    name: Setup CLI E2E test matrix
    runs-on: ubuntu-latest
    outputs:
      cli_e2e_matrix: ${{ steps.filter_cli_e2e.outputs.cli_e2e_matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/enumerate-tests
        id: generate_tests_matrix
        with:
          buildArgs: '/p:IncludeCliE2ETests=true /p:SkipTests=false'

      - name: Filter CLI E2E test matrix
        id: filter_cli_e2e
        shell: pwsh
        run: |
          # Read the canonical matrix from disk rather than the action's
          # `all_tests` output: composite-action output propagation has
          # silently dropped the value when the expanded matrix is large
          # (~157KB with IncludeCliE2ETests=true). The canonical file is
          # written into the parent workspace by enumerate-tests and is
          # what we want here anyway (per-test, not per-OS).
          $canonicalMatrix = "${{ github.workspace }}/artifacts/canonical-test-matrix.json"
          if (-not (Test-Path $canonicalMatrix)) {
            Write-Error "Canonical test matrix not found at $canonicalMatrix"
            exit 1
          }

          $canonical = Get-Content $canonicalMatrix -Raw | ConvertFrom-Json
          $cliE2ETests = @($canonical.tests | Where-Object {
            $_.projectName -eq 'Aspire.Cli.EndToEnd.Tests' -and $_.type -eq 'class'
          })

          if ($cliE2ETests.Count -eq 0) {
            Write-Error "No Aspire.Cli.EndToEnd.Tests class entries were found in the canonical test matrix."
            exit 1
          }

          Write-Host "Found $($cliE2ETests.Count) CLI E2E class entries"

          $matrix = ConvertTo-Json @{ include = @($cliE2ETests) } -Compress -Depth 10
          "cli_e2e_matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Write run parameters summary
        if: always()
        run: |
          {
            echo "## Run parameters"
            echo ""
            echo "| Parameter | Value |"
            echo "|---|---|"
            echo "| Quality (channel) | \`${{ inputs.quality || 'release' }}\` |"
            echo "| Expected version | \`${{ inputs.version || '13.4.0' }}\` |"
            echo "| Triggered by | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref }}\` |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build_cli_e2e_image:
    name: Build CLI E2E Docker image
    uses: ./.github/workflows/build-cli-e2e-image.yml
    needs: setup_cli_e2e_tests
    with:
      includePolyglotImages: true

  validate-published-build:
    name: ${{ matrix.shortname }} (${{ inputs.quality || 'staging' }})
    needs: [setup_cli_e2e_tests, build_cli_e2e_image]
    if: ${{ fromJson(needs.setup_cli_e2e_tests.outputs.cli_e2e_matrix).include[0] != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_cli_e2e_tests.outputs.cli_e2e_matrix) }}

    steps:
      # Fail fast on an empty `version` instead of running the whole matrix
      # green-but-blind. CliInstallStrategy.Detect deliberately treats an
      # empty ASPIRE_E2E_EXPECTED_VERSION as "no assertion requested", so an
      # empty value here would silently bypass the channel-pointer check that
      # is the whole point of this workflow.
      - name: Validate workflow inputs
        env:
          INPUT_VERSION: ${{ inputs.version || '13.4.0' }}
          INPUT_QUALITY: ${{ inputs.quality || 'release' }}
        run: |
          if [ -z "${INPUT_VERSION// /}" ]; then
            echo "::error::'version' input is empty. Dispatch must supply the exact version to assert post-install (e.g. 9.4.1)."
            exit 1
          fi
          if [ -z "${INPUT_QUALITY// /}" ]; then
            echo "::error::'quality' input is empty. Dispatch must supply dev | staging | release."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
        env:
          # Share the install dir with Arcade so ./build.sh below reuses the
          # same .NET install rather than re-downloading via eng/common/tools.sh.
          DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet

      - name: Verify Docker is running
        run: docker info

      - name: Download and load prebuilt CLI E2E Docker images
        uses: ./.github/actions/download-cli-e2e-images
        with:
          require-java: ${{ contains(matrix.shortname, 'Java') }}

      - name: Restore and build E2E test project
        # Scoped Arcade restore+build for just the test project — avoids the
        # full-repo `./restore.sh` and the redundant implicit restore that
        # `dotnet build` would otherwise do. Mirrors run-tests.yml.
        env:
          DOTNET_ROOT: ${{ github.workspace }}/.dotnet
          MSBUILDTERMINALLOGGER: "false"
        run: ./build.sh -restore -ci -build -projects ${{ github.workspace }}/tests/Aspire.Cli.EndToEnd.Tests/Aspire.Cli.EndToEnd.Tests.csproj

      - name: Run CLI E2E tests against published build
        # Install via the channel (ASPIRE_E2E_QUALITY) rather than by version so
        # the tests exercise the same channel-resolution path real users hit.
        # ASPIRE_E2E_EXPECTED_VERSION drives the post-install `aspire --version`
        # assertion that catches stale channel pointers.
        env:
          ASPIRE_E2E_QUALITY: ${{ inputs.quality || 'release' }}
          ASPIRE_E2E_EXPECTED_VERSION: ${{ inputs.version || '13.4.0' }}
          ASPIRE_E2E_CLI_VERSION_OUTPUT_DIR: ${{ github.workspace }}/testresults/cli-versions
          TEST_CLASS: ${{ matrix.classname }}
          TRX_FILE_NAME: ${{ matrix.shortname }}.trx
        run: |
          # MTP diagnostic flags below mirror eng/Testing.props $(_MtpDiagnosticFlags)
          # + the default TestHangTimeout (10m) / TestSessionTimeout (20m).
          # eng/Testing.props is the canonical source for the build/test-host code
          # path; this dispatch workflow runs the test project directly against an
          # installed CLI (no runsheet metadata pipeline) so the values are
          # duplicated here. Keep them in sync if eng/Testing.props changes.
          #
          # Use ./dotnet.sh (the Arcade wrapper) instead of bare `dotnet` so the
          # MSBuildSDKsPath and other env vars set up by eng/common/tools.sh during
          # the build step above are in scope. Bare `dotnet test` fails the
          # "Get projects properties with MSBuild" pre-check that detects the test
          # runner type, then bails because global.json mandates MTP.
          ./dotnet.sh test --project tests/Aspire.Cli.EndToEnd.Tests/Aspire.Cli.EndToEnd.Tests.csproj \
            --no-restore \
            --no-build \
            -- \
            --ignore-exit-code 8 \
            --crashdump \
            --hangdump --hangdump-type none --hangdump-timeout 10m \
            --timeout 20m \
            --report-trx \
            --report-trx-filename "$TRX_FILE_NAME" \
            --results-directory ${{ github.workspace }}/testresults \
            --filter-class "$TEST_CLASS" \
            --filter-not-trait "quarantined=true" \
            --filter-not-trait "outerloop=true"

      - name: Upload logs and test results
        id: upload-logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: validate-published-build-${{ inputs.quality || 'staging' }}-${{ matrix.shortname }}
          path: |
            testresults/**
            **/TestResults/**/*.log
          if-no-files-found: ignore

      - name: Generate test results summary
        if: always()
        continue-on-error: true
        env:
          TEST_RESULTS_ARTIFACT_URL: ${{ steps.upload-logs.outputs.artifact-url }}
        run: |
          if [ -d "${{ github.workspace }}/testresults" ]; then
            summary_args=(
              run
              --project
              "${{ github.workspace }}/tools/GenerateTestSummary/GenerateTestSummary.csproj"
              --
              "${{ github.workspace }}/testresults"
            )

            artifact_url="${TEST_RESULTS_ARTIFACT_URL:-}"
            if [ -n "$artifact_url" ]; then
              summary_args+=("-u" "$artifact_url")
            fi

            dotnet "${summary_args[@]}"
          fi

      - name: Add Aspire CLI version summary
        if: always()
        continue-on-error: true
        run: |
          versions_dir="${{ github.workspace }}/testresults/cli-versions"

          {
            echo ""
            echo "## Aspire CLI versions installed"
            echo ""

            if compgen -G "$versions_dir/*.env" > /dev/null; then
              for version_file in "$versions_dir"/*.env; do
                # Each file contains key=value lines emitted by
                # CliE2EAutomatorHelpers.BuildVersionRecordCommand:
                #   test=...
                #   mode=...
                #   strategy=...
                #   expected=...
                #   version=...
                #   baseVersion=...
                # Show the test name as the bullet, with just strategy + installed
                # version below — the rest is noise for an at-a-glance summary.
                test_name=$(sed -n 's/^test=//p' "$version_file" | head -n1)
                strategy=$(sed -n 's/^strategy=//p' "$version_file" | head -n1)
                version=$(sed -n 's/^version=//p' "$version_file" | head -n1)
                echo "- \`${test_name:-(unknown test)}\`"
                echo "  - strategy: ${strategy:-(unknown)}"
                echo "  - version: \`${version:-(unknown)}\`"
              done
            else
              echo "No Aspire CLI version records were produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Create or update a tracking issue when validation fails or hangs.
  # validate-published-build is dispatched fire-and-forget from the AzDO
  # pipelines, so without this nobody sees failures unless they're watching
  # the Actions UI. Dedup by (version, quality) — re-dispatches against the
  # same broken build accumulate as comments on one issue.
  create-issue-on-failure:
    name: Create Issue on Failure
    needs: [validate-published-build]
    runs-on: ubuntu-latest
    # cancelled() is required to catch the per-leg timeout: a job that hits
    # its `timeout-minutes` concludes as `cancelled`, not `failure`
    # (https://docs.github.com/actions/learn-github-actions/expressions#cancelled).
    # It also fires on manual cancels and concurrency-group auto-cancels,
    # which would open a tracking issue too — that's mild noise we accept
    # because losing timeout coverage would defeat the failure-visibility
    # goal of this job.
    if: ${{ (failure() || cancelled()) && github.event_name == 'workflow_dispatch' }}
    permissions:
      issues: write
    steps:
      # `script:` below loads create-failure-tracking-issue.js from
      # $GITHUB_WORKSPACE — the working directory is set, but it is empty
      # until actions/checkout populates it, so this checkout step is
      # required for the require() call to resolve. Matches the pattern in
      # create-failing-test-issue.yml and apply-test-attributes.yml.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create or comment on tracking issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          QUALITY: ${{ inputs.quality || 'release' }}
          VERSION: ${{ inputs.version || '13.4.0' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { createOrCommentOnFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/workflows/create-failure-tracking-issue.js`);

            const quality = process.env.QUALITY;
            const version = process.env.VERSION;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Title is the dedup key. Format must stay stable so re-dispatches
            // for the same (version, quality) attach to the same tracking issue.
            const title = `[Validate Published Build] ${version} (${quality}) failed`;
            const body = [
              '## Published Build Validation Failure',
              '',
              `The \`validate-published-build\` workflow failed for **${quality}** at version **${version}**.`,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              'This usually means one of:',
              '- The channel pointer (`aka.ms/dotnet/.../{quality}`) resolved to a different build than expected.',
              '- The published archive is missing or corrupted on ci.dot.net.',
              '- A genuine CLI regression in the published build.',
              '',
              '### Next Steps',
              '1. Open the workflow run above and inspect failing test classes.',
              `2. Confirm \`aka.ms/dotnet/.../${quality}\` resolves to \`${version}\` (mismatch = stale channel pointer).`,
              '3. If the channel pointer is correct, treat as a CLI regression in the published build.',
              '',
              'This issue was automatically created by the validate-published-build workflow.'
            ].join('\n');

            await createOrCommentOnFailureIssue({
              github,
              core,
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['area-cli', 'failing-test'],
              runUrl,
            });
