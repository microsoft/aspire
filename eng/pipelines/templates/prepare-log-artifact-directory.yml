steps:
# Installer preparation jobs do not run MSBuild, but the shared 1ES job template
# always publishes the standard log artifact path. Create a marker file so that
# non-production artifact validation has a real log artifact to publish.
- pwsh: |
    $ErrorActionPreference = 'Stop'

    $logDirectory = '$(Build.ArtifactStagingDirectory)/artifacts/log/$(_BuildConfig)'
    New-Item -ItemType Directory -Path $logDirectory -Force | Out-Null

    $markerPath = Join-Path $logDirectory 'installer-job.txt'
    Set-Content -Path $markerPath -Value 'Installer preparation jobs do not produce MSBuild logs.'
  displayName: 🟣Prepare log artifact directory
