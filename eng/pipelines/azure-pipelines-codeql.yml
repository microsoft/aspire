parameters:
  # Optionally do not publish to TSA. Useful for e.g. verifying fixes before PR.
- name: TSAEnabled
  displayName: Publish results to TSA
  type: boolean
  default: true

variables:
- template: /eng/pipelines/common-variables.yml
- template: /eng/common/templates/variables/pool-providers.yml
  # CG is handled in the primary CI pipeline
- name: skipComponentGovernanceDetection
  value: true
  # Force CodeQL enabled so it may be run on any branch
- name: Codeql.Enabled
  value: true
  # Do not let CodeQL 3000 Extension gate scan frequency
- name: Codeql.Cadence
  value: 0
  # CodeQL needs this plumbed along as a variable to enable TSA
- name: Codeql.TSAEnabled
  value: ${{ parameters.TSAEnabled }}

  # Build variables
- name: _BuildConfig
  value: Release

trigger: none

schedules:
  - cron: 0 12 * * 1
    displayName: Weekly Monday CodeQL run
    branches:
      include:
      - main
      - release/13.2
    always: true

jobs:
- job: codeql
  displayName: CodeQL
  pool:
    name: $(DncEngInternalBuildPool)
    demands: ImageOverride -equals 1es-windows-2022
  timeoutInMinutes: 90

  steps:

  - task: UseDotNet@2
    inputs:
      useGlobalJson: true

  # Install Node.js, yarn, and vsce so the VS Code extension can be built
  - task: NodeTool@0
    displayName: Install node.js
    inputs:
      versionSpec: '20.x'

  - task: npmAuthenticate@0
    displayName: NPM authenticate
    inputs:
      workingFile: $(Build.SourcesDirectory)\.npmrc

  - task: PowerShell@2
    displayName: Set npm/yarn auth environment
    inputs:
      targetType: 'inline'
      script: |
        $ErrorActionPreference = 'Stop'
        $npmrcPath = "$(Build.SourcesDirectory)\.npmrc"
        Write-Host "##vso[task.setvariable variable=NPM_CONFIG_USERCONFIG]$npmrcPath"

        $npmrc = Get-Content $npmrcPath
        $tokenLine = $npmrc | Where-Object { $_ -match ':_authToken=' } | Select-Object -First 1
        if ($tokenLine) {
          $token = ($tokenLine -split '=', 2)[1]
          Write-Host "##vso[task.setvariable variable=YARN_NPM_AUTH_TOKEN;issecret=true]$token"
          exit 0
        }

        $usernameLine = $npmrc | Where-Object { $_ -match ':username=' } | Select-Object -First 1
        $passwordLine = $npmrc | Where-Object { $_ -match ':_password=' } | Select-Object -First 1
        if ($usernameLine -and $passwordLine) {
          $username = ($usernameLine -split '=', 2)[1]
          $encodedPassword = ($passwordLine -split '=', 2)[1]
          $password = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($encodedPassword))
          Write-Host "##vso[task.setvariable variable=YARN_NPM_AUTH_IDENT;issecret=true]$username`:$password"
          exit 0
        }

        Write-Error "Could not find npm auth credentials in $npmrcPath."

  - task: PowerShell@2
    displayName: Install yarn
    inputs:
      targetType: 'inline'
      script: |
        npm install -g corepack@0.34.7 --force
        corepack enable yarn
        corepack prepare yarn@4.14.1 --activate
        yarn --version
      workingDirectory: '$(Build.SourcesDirectory)'

  - task: PowerShell@2
    displayName: Install vsce
    inputs:
      targetType: 'inline'
      script: |
        npm install -g @vscode/vsce@3.7.1
        vsce --version
      workingDirectory: '$(Build.SourcesDirectory)'

  - task: CodeQL3000Init@0
    displayName: CodeQL Initialize

  - script: build.cmd
      -restore -build
      -configuration $(_BuildConfig)
      -prepareMachine
      -ci
      /p:BuildExtension=true
      /p:SkipNativeBuild=true
    displayName: Build

  - task: CodeQL3000Finalize@0
    displayName: CodeQL Finalize
